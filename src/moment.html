<include src="layout.html">
  <template name="head">
    <title th:text="|瞬间 - ${site.title}|">Moment</title>
  </template>

  <article class="moment-detail" th:with="content = ${moment.spec.content}">
    <header class="page-heading">
      <p>moment</p>
      <h1>瞬间</h1>
      <time th:text="${#temporals.format(moment.spec.releaseTime, 'yyyy.MM.dd HH:mm')}"></time>
    </header>

    <div
      class="moment-content"
      th:if="${not #strings.isEmpty(content.html)}"
      th:utext="${content.html}"
    ></div>

    <div class="moment-media" th:if="${not #lists.isEmpty(content.medium)}">
      <th:block th:each="momentItem : ${content.medium}">
        <img
          th:if="${momentItem.type.name == 'PHOTO'}"
          th:src="${momentItem.url}"
          alt=""
          loading="lazy"
        />
        <video
          th:if="${momentItem.type.name == 'VIDEO'}"
          th:src="${momentItem.url}"
          controls
        ></video>
        <audio
          th:if="${momentItem.type.name == 'AUDIO'}"
          th:src="${momentItem.url}"
          controls
        ></audio>
      </th:block>
    </div>

    <div class="moment-tags" th:if="${not #lists.isEmpty(moment.spec.tags)}">
      <span th:each="tag : ${moment.spec.tags}" th:text="|#${tag}|"></span>
    </div>
  </article>

  <div th:if="${haloCommentEnabled}">
    <halo:comment group="moment.halo.run" kind="Moment" th:attr="name=${moment.metadata.name}" />
  </div>
</include>
