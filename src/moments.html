<include src="layout.html">
  <template name="head">
    <title th:text="|瞬间 - ${site.title}|">Moments</title>
    <link
      th:if="${pluginFinder.available('PluginFeed')}"
      rel="alternate"
      type="application/rss+xml"
      title="Moments - All"
      th:href="@{/moments/rss.xml}"
    />
  </template>

  <section class="moments-page">
    <header class="page-heading">
      <p>moments</p>
      <h1>瞬间</h1>
    </header>

    <ol class="moment-list" th:if="${not #lists.isEmpty(moments.items)}">
      <li
        class="moment-item"
        th:each="moment : ${moments.items}"
        th:with="content = ${moment.spec.content}"
      >
        <div class="moment-meta">
          <time th:text="${#temporals.format(moment.spec.releaseTime, 'yyyy.MM.dd')}"></time>
          <span th:if="${moment.owner}" th:text="${moment.owner.displayName}"></span>
        </div>

        <a class="moment-body" th:href="@{|/moments/${moment.metadata.name}|}">
          <div
            class="moment-content"
            th:if="${not #strings.isEmpty(content.html)}"
            th:utext="${content.html}"
          ></div>
        </a>

        <div class="moment-media" th:if="${not #lists.isEmpty(content.medium)}">
          <th:block th:each="momentItem : ${content.medium}">
            <img
              th:if="${momentItem.type.name == 'PHOTO'}"
              th:src="${momentItem.url}"
              alt=""
              loading="lazy"
            />
            <video
              th:if="${momentItem.type.name == 'VIDEO'}"
              th:src="${momentItem.url}"
              controls
            ></video>
            <audio
              th:if="${momentItem.type.name == 'AUDIO'}"
              th:src="${momentItem.url}"
              controls
            ></audio>
          </th:block>
        </div>

        <div class="moment-tags" th:if="${not #lists.isEmpty(moment.spec.tags)}">
          <span th:each="tag : ${moment.spec.tags}" th:text="|#${tag}|"></span>
        </div>
      </li>
    </ol>

    <p class="empty-state" th:if="${#lists.isEmpty(moments.items)}">还没有瞬间。</p>
  </section>
</include>
