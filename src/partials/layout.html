<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&family=Noto+Sans+SC:wght@400;500;700&family=Noto+Serif+SC:wght@400;600;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&display=swap"
    />
    <slot name="head">
      <title th:text="${site.title}">Site Title</title>
    </slot>
    <script type="module" src="./js/main.ts"></script>
  </head>
  <body>
    <header class="site-header">
      <div class="container">
        <a class="site-title" th:href="@{/}" th:text="${site.title}">Site Title</a>
        <nav class="site-nav" th:with="menu = ${menuFinder.getPrimary()}">
          <ul>
            <li th:each="item : ${menu.menuItems}">
              <a
                th:href="@{${item.status.href}}"
                th:text="${item.status.displayName}"
                th:target="${item.spec.target?.value}"
              ></a>
            </li>
          </ul>
        </nav>
      </div>
    </header>

    <main
      class="site-main"
      th:classappend="${_templateId == 'index'} ? ' site-main-home'"
      th:style="${_templateId == 'index' && not #strings.isEmpty(theme.config.home.background_image)} ? |--home-background-image: url('${theme.config.home.background_image}')|"
    >
      <div class="container">
        <slot />
      </div>
    </main>

    <footer class="site-footer">
      <div class="container">
        <p th:text="${theme.config.basic.custom_footer ?: site.title}"></p>
        <halo:footer />
      </div>
    </footer>
  </body>
</html>
