<li
  class="post-item"
  th:classappend="${#strings.isEmpty(post.spec.cover)} ? ' post-item-no-cover'"
  th:each="post : ${posts.items}"
>
  <p class="post-index" th:text="${#numbers.formatInteger(postStat.count, 2)}">01</p>
  <div class="post-body">
    <h3 class="post-title">
      <a th:href="@{${post.status.permalink}}" th:text="${post.spec.title}"></a>
    </h3>
    <p class="post-meta">
      <span class="post-meta-item">
        <time th:text="${#temporals.format(post.spec.publishTime, 'yyyy.MM.dd')}"></time>
      </span>
      <span class="post-meta-item" th:if="${not #lists.isEmpty(post.categories)}">
        <a
          th:each="cat : ${post.categories}"
          th:href="@{${cat.status.permalink}}"
          th:text="${cat.spec.displayName}"
          class="category"
        ></a>
      </span>
      <span class="post-meta-item">
        阅读量
        <span th:text="${post.stats?.visit ?: 0}">0</span>
      </span>
      <span class="post-meta-tags" th:if="${not #lists.isEmpty(post.tags)}">
        <a
          th:each="tag : ${post.tags}"
          th:href="@{${tag.status.permalink}}"
          th:text="|#${tag.spec.displayName}|"
          class="post-tag-badge inline-flex w-fit shrink-0 items-center justify-center gap-1 overflow-hidden rounded-full border border-transparent px-2 py-0.5 text-xs font-medium whitespace-nowrap transition-[color,box-shadow]"
        ></a>
      </span>
    </p>
    <p class="post-excerpt" th:text="${post.status.excerpt}"></p>
  </div>
  <figure class="post-cover" th:if="${not #strings.isEmpty(post.spec.cover)}">
    <a th:href="@{${post.status.permalink}}">
      <img th:src="@{${post.spec.cover}}" th:alt="${post.spec.title}" loading="lazy" />
    </a>
  </figure>
</li>
